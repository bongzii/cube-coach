<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cube Coach" />
    <meta name="application-name" content="Cube Coach" />
    <meta name="description" content="OLL/PLL Rubik's Cube Trainer — Learn and practice algorithms with interactive 3D cube visualizations and a built-in stopwatch." />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" /></noscript>
    <link rel="preload" as="image" href="logo.png" />
    <link rel="prefetch" href="manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="logo.png" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/inter/v19/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hiA.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/spacegrotesk/v20/omn0tEC03cW5RKDwe786KfQR3rfh.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/jetbrainsmono/v25/tDbD2oQ7l7aF48U85xC2bBwKlhg.woff2" />
    <style>
      :root {
        --theme-bg: #facc15;
        --theme-text: #000000;
        --theme-card-bg: #ffffff;
        --theme-card-text: #000000;
        --theme-border: #000000;
        --theme-primary: #2563eb;
        --theme-primary-hover: #1d4ed8;
        --theme-accent: #facc15;
        --theme-accent-light: #fef08a;
        --theme-muted: #f3f4f6;
        --theme-shadow: rgba(0, 0, 0, 1);
      }
      * { box-sizing: border-box; }
      html { -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0;
        min-height: 100vh;
        background-color: var(--theme-bg);
        color: var(--theme-text);
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (theme === 'dark' || (!theme && systemDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <title>Cube Coach — OLL/PLL Rubik's Cube Trainer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
